<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Others</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .others-banner{
            height:350px;
            background:url("images/otherbanner.jpg") center/cover no-repeat;
        }

        .product-card{
            position:relative;
            overflow:hidden;
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-8px);
        }

        .product-card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .discount-badge{
            position:absolute;
            top:10px;
            left:10px;
            background:#6c757d;
            color:white;
            padding:5px 10px;
            font-size:13px;
            font-weight:bold;
            border-radius:5px;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
            margin-right:8px;
        }

        .new-price{
            color:#6c757d;
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="fashionAura.html">FashionAura</a>
    <span class="text-white">Other Products</span>
    <div>
      <a href="wishlist.html" class="btn btn-outline-light me-2">❤️</a>
      <a href="cart.html" class="btn btn-warning">🛒</a>
    </div>
  </div>
</nav>

<!-- BANNER -->
<div class="others-banner d-flex align-items-center justify-content-center text-white">
    <h1 class="fw-bold">OTHERS</h1>
</div>

<!-- OFFER SECTION -->
<div class="container text-center mt-4">
    <div class="bg-secondary text-white p-4 rounded">
        <h4>🎁 Special Deals on Unique Items</h4>
        <p>Explore More Categories</p>
    </div>
</div>

<!-- PRODUCTS -->
<div class="container mt-5">
    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-md-3">
            <div class="card product-card">
                <div class="discount-badge">20% OFF</div>
                <img src="images/perfume.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Premium Perfume</h6>
                    <p>
                        <span class="old-price">₹2,000</span>
                        <span class="new-price">₹1,600</span>
                    </p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="images/cap.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Stylish Cap</h6>
                    <p class="text-muted">₹599</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="images/wallet.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Leather Wallet</h6>
                    <p class="text-muted">₹1,199</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="images/gifthamper.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Gift Hamper</h6>
                    <p class="text-muted">₹2,499</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 FashionAura
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
