<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessories</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .accessories-banner{
            height:350px;
            background:url("accesoriesbanner\'.jpg") center/cover no-repeat;
        }

        .product-card{
            position:relative;
            overflow:hidden;
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-8px);
        }

        .product-card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .discount-badge{
            position:absolute;
            top:10px;
            left:10px;
            background:#000;
            color:#fff;
            padding:5px 10px;
            font-size:13px;
            font-weight:bold;
            border-radius:5px;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
            margin-right:8px;
        }

        .new-price{
            color:#000;
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="fashionAura.html">FashionAura</a>
    <span class="text-white">Accessories Collection</span>
    <div>
      <a href="wishlist.html" class="btn btn-outline-light me-2">❤️</a>
      <a href="cart.html" class="btn btn-warning">🛒</a>
    </div>
  </div>
</nav>

<!-- BANNER -->
<div class="accessories-banner d-flex align-items-center justify-content-center text-white">
    <h1 class="fw-bold">ACCESSORIES</h1>
    
</div>

<!-- OFFER SECTION -->
<div class="container text-center mt-4">
    <div class="bg-dark text-white p-4 rounded">
        <h4>✨ Flat 25% OFF on Premium Accessories</h4>
        <p>Limited Time Offer</p>
    </div>
</div>

<!-- PRODUCTS -->
<div class="container mt-5">
    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-md-3">
            <div class="card product-card">
                <div class="discount-badge">25% OFF</div>
                <img src="watch.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Luxury Watch</h6>
                    <p>
                        <span class="old-price">₹5,000</span>
                        <span class="new-price">₹3,750</span>
                    </p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="bag.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Leather Handbag</h6>
                    <p class="text-muted">₹2,999</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-3">
            <div class="card product-card">
                <div class="discount-badge">30% OFF</div>
                <img src="sunglasses.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Stylish Sunglasses</h6>
                    <p>
                        <span class="old-price">₹1,999</span>
                        <span class="new-price">₹1,399</span>
                    </p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="belt.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Classic Leather Belt</h6>
                    <p class="text-muted">₹899</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 FashionAura
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
