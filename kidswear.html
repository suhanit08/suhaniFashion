<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kids Wear</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .kids-banner{
            height:350px;
            background:url("images/kidsbanner.jpg") center/cover no-repeat;
        }

        .product-card{
            position:relative;
            overflow:hidden;
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-8px);
        }

        .product-card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .discount-badge{
            position:absolute;
            top:10px;
            left:10px;
            background:#ff4081;
            color:white;
            padding:5px 10px;
            font-size:13px;
            font-weight:bold;
            border-radius:5px;
        }

        .old-price{
            text-decoration:line-through;
            color:gray;
            margin-right:8px;
        }

        .new-price{
            color:#ff4081;
            font-weight:bold;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="fashionAura.html">FashionAura</a>
    <span class="text-white">Kids Collection</span>
    <div>
      <a href="wishlist.html" class="btn btn-outline-light me-2">❤️</a>
      <a href="cart.html" class="btn btn-warning">🛒</a>
    </div>
  </div>
</nav>

<!-- BANNER -->
<div class="kids-banner d-flex align-items-center justify-content-center text-white">
    <h1 class="fw-bold">KIDS WEAR</h1>
</div>

<!-- OFFER SECTION -->
<div class="container text-center mt-4">
    <div class="bg-warning text-dark p-4 rounded">
        <h4>🎉 Flat 30% OFF on Kids Fashion</h4>
        <p>Hurry up! Limited time offer</p>
    </div>
</div>

<!-- PRODUCTS -->
<div class="container mt-5">
    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-md-3">
            <div class="card product-card">
                <div class="discount-badge">30% OFF</div>
                <img src="images/cuteprintbabyshirt.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Cute Printed T-Shirt</h6>
                    <p>
                        <span class="old-price">₹999</span>
                        <span class="new-price">₹699</span>
                    </p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="images/denimshortkid.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Denim Shorts</h6>
                    <p class="text-muted">₹799</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-3">
            <div class="card product-card">
                <div class="discount-badge">25% OFF</div>
                <img src="images/partydresskid.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Party Dress</h6>
                    <p>
                        <span class="old-price">₹1,499</span>
                        <span class="new-price">₹1,099</span>
                    </p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-md-3">
            <div class="card product-card">
                <img src="images/kidsneakers.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h6>Kids Sneakers</h6>
                    <p class="text-muted">₹1,299</p>
                    <button class="btn btn-dark w-100">Buy Now</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 FashionAura
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
