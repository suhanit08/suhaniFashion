<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - FashionAura</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#000,#555);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

</style>

</head>
<body>

<div class="login-box">

<h3 class="text-center mb-4">FashionAura Login</h3>

<form onsubmit="return loginUser()">

<div class="mb-3">
<label>Username</label>
<input type="text" id="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control" required>
</div>

<button class="btn btn-dark w-100">Login</button>

<p id="error" class="text-danger mt-3 text-center"></p>

</form>

</div>

<script>

function loginUser(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){

localStorage.setItem("loggedIn","true");

window.location.href="fashionAura.html";

return false;

}
else{

document.getElementById("error").innerText="Invalid Username or Password";

return false;

}

}

</script>

</body>
</html>
