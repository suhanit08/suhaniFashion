<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fashion Aura</title>
    <link rel="icon" type="png" href="favicon.png">
  <style>
    img{
      height: 450px;
      object-fit: contain;
margin-top: 10px;
    }
    .wear{
width:100px;
height:100px;
border-radius: 50%;
object-fit: cover;


}
.col{
    display: flex;
    flex-direction: column;
    justify-content: center;
align-items: center;
}
.container{
    display: flex;
    gap:30px;
    margin: 0 auto;
}
.section{
    text-decoration: none;
    color: black;
}
 .wishlist-icon{
            position:absolute;
            top:10px;
            right:10px;
            background:white;
            width:35px;
            height:35px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:0.3s;
        }

        .wishlist-icon:hover{
            background:red;
            color:white;
        }
  </style>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<!-- ================= CAROUSEL ================= -->
<div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">

   <span class="carousel-control-prev-icon bg-dark rounded-circle p-4" aria-hidden="true"></span>
